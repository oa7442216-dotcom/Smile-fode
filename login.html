<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | سمايل فود</title>

<link rel="stylesheet" href="style.css">

<style>
.login-box{
max-width:400px;
margin:60px auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.login-box h2{
text-align:center;
color:#0b7a2a;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

.login-box button{
width:100%;
padding:12px;
background:#0b7a2a;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.login-box button:hover{
background:#095e20;
}

.login-box p{
text-align:center;
margin-top:15px;
}

.login-box a{
color:#0b7a2a;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<header>
<div class="logo">🫒 سمايل فود</div>
</header>

<div class="login-box">

<h2>تسجيل الدخول</h2>

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<p>
ليس لديك حساب؟
<a href="register.html">إنشاء حساب</a>
</p>

</div>

<script>

function login(){

let email=document.getElementById("email").value;

let password=document.getElementById("password").value;

if(email==="admin@smilefood.com" && password==="123456"){

alert("مرحباً بك");

window.location.href="admin.html";

}else{

alert("البريد الإلكتروني أو كلمة المرور غير صحيحة");

}

}

</script>

</body>
</html>
