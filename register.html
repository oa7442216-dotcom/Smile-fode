<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب | سمايل فود</title>

<link rel="stylesheet" href="style.css">

<style>
.register-box{
max-width:450px;
margin:60px auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.register-box h2{
text-align:center;
color:#0b7a2a;
margin-bottom:20px;
}

.register-box input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

.register-box button{
width:100%;
padding:12px;
background:#0b7a2a;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.register-box button:hover{
background:#095e20;
}

.register-box p{
text-align:center;
margin-top:15px;
}

.register-box a{
color:#0b7a2a;
text-decoration:none;
font-weight:bold;
}
</style>

</head>
<body>

<header>
<div class="logo">🫒 سمايل فود</div>
</header>

<div class="register-box">

<h2>إنشاء حساب جديد</h2>

<input type="text" id="name" placeholder="الاسم بالكامل">

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<input type="password" id="confirm" placeholder="تأكيد كلمة المرور">

<button onclick="register()">إنشاء حساب</button>

<p>
لديك حساب؟
<a href="login.html">تسجيل الدخول</a>
</p>

</div>

<script>

function register(){

let pass=document.getElementById("password").value;
let confirm=document.getElementById("confirm").value;

if(pass!==confirm){
alert("كلمة المرور غير متطابقة");
return;
}

alert("تم إنشاء الحساب بنجاح");

window.location.href="login.html";

}

</script>

</body>
</html>
